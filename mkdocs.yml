
# --- Metadados para SEO e publicação ---
site_name: PYield Docs
site_url: https://crdcj.github.io/PYield/
site_description: Biblioteca financeira para o mercado brasileiro.
site_author: Carlos Carvalho

watch:
  - pyield
  
nav:
  - Início: index.md
  - Artigos:
      - Introdução ao Pyield: articles/pyield_intro.md
  - Ferramentas:
      - Dias Úteis (DU): du.md
      - Interpolador: interpolador.md
      - Forwards (taxas a termo): forwards.md
  - Títulos Públicos Federais:
      - TPF: tpf.md
      - LFT: lft.md
      - LTN: ltn.md
      - NTN-F: ntnf.md
      - NTN-B: ntnb.md
      - NTN-B Principal: ntnbp.md
      - NTN-B1: ntnb1.md
      - NTN-C: ntnc.md
  - Mercado de Futuros:
      - DI1: di1.md
      - Futuro: futuro.md
  - Dados Auxiliares:
      - IPCA: ipca.md
      - Selic / COPOM: selic.md

theme:
  name: 'material'
  language: 'pt-BR'
  palette:
    - scheme: slate
      toggle:
        icon: material/lightbulb-outline
        name: Alternar para modo claro
    - scheme: default
      toggle:
        icon: material/lightbulb
        name: Alternar para modo escuro

  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.select    
    - search.suggest
    - search.highlight
    - search.share    
 
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_toc_entry: false
            docstring_style: google
            docstring_section_style: table
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_overloads: false
            

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables

repo_url: 'https://github.com/crdcj/PYield'
repo_name: 'PYield'
copyright: '@ 2024-2026 <strong>Carlos Carvalho</strong>. Todos os direitos reservados.'
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/crdcj/PYield

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
